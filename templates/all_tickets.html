{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">All Tickets</h2>
<table class="table table-hover">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Title</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody>
        {% for ticket in tickets %}
        <tr>
            <td>{{ ticket.id }}</td>
            <td><a href="/ticket/{{ ticket.id }}">{{ ticket.title }}</a></td>
            <td>{{ ticket.priority }}</td>
            <td>{{ ticket.status }}</td>
            <td>{{ ticket.created_at.strftime('%d %b %Y') }}</td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="text-center text-muted">No tickets found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
